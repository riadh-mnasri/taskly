databaseChangeLog:
  - changeSet:
      id: 002-create-tasks-table
      author: taskly
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tasks_user_id
                    references: users(id)
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: subject
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: estimated_duration_minutes
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_tasks_user_id
            tableName: tasks
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_tasks_priority
            tableName: tasks
            columns:
              - column:
                  name: priority
        - createIndex:
            indexName: idx_tasks_status
            tableName: tasks
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_tasks_due_date
            tableName: tasks
            columns:
              - column:
                  name: due_date
