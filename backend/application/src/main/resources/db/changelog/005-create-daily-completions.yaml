databaseChangeLog:
  - changeSet:
      id: 005-create-daily-completions
      author: taskly
      changes:
        - createTable:
            tableName: daily_completions
            columns:
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: completion_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: xp_gained
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: daily_completions
            columnNames: user_id, completion_date
            constraintName: pk_daily_completions
