name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Test-only for now — deploys stay manual (vercel deploy --prod / render CLI)
# until VERCEL_TOKEN and RENDER_API_KEY secrets are provisioned, since neither
# CLI can mint those tokens from this environment (both require a dashboard visit).

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: backend
      - run: ./gradlew test --no-daemon
        working-directory: backend

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false
      - run: npm run build
