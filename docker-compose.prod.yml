services:
  db:
    image: postgres:16-alpine
    container_name: taskly-db
    environment:
      POSTGRES_DB: ${DB_NAME:-taskly}
      POSTGRES_USER: ${DB_USER:-taskly}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - taskly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskly} -d ${DB_NAME:-taskly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskly-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-taskly}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-taskly}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      TASKLY_JWT_SECRET: ${JWT_SECRET}
      TASKLY_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskly-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  taskly_postgres_data:
    name: taskly_postgres_data_prod
